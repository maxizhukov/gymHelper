name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual re-deploys from the Actions tab

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 165.227.137.141
      DEPLOY_USER: deploy
      DEPLOY_PATH: /opt/gymhelper
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          # Write the deploy key from the repo secret (stored base64-encoded so
          # newlines can't be mangled when pasting into the GitHub secret).
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pull the just-pushed commit on the server and (re)build the stack.
          #
          # The root disk is small, so BuildKit's parallel builds run the volume
          # out of space ("ENOSPC: no space left on device" during `npm ci`).
          # Free scratch space first, then build each service serially with the
          # classic (non-BuildKit) builder, which is what works manually. Finally
          # start the stack without --build so nothing is rebuilt at up time.
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git pull --ff-only origin main
          apt clean || true
          journalctl --vacuum-time=1d || true
          rm -rf /tmp/* || true
          rm -rf /var/tmp/* || true
          docker builder prune -af || true
          DOCKER_BUILDKIT=0 COMPOSE_DOCKER_CLI_BUILD=0 docker compose build caddy
          DOCKER_BUILDKIT=0 COMPOSE_DOCKER_CLI_BUILD=0 docker compose build backend
          docker compose up -d --remove-orphans
          docker image prune -f || true
          docker ps
          curl -sS https://gym.maksymzhukov.com/api/db-health
          REMOTE

      # Once the new stack is live, wait a few seconds for the backend to accept
      # traffic, then ping its deploy webhook. The app turns that into a Telegram
      # message so we get notified that a new version is deployed. Best-effort:
      # a failed ping must not mark an otherwise-successful deploy as failed.
      - name: Notify deploy via webhook
        continue-on-error: true
        env:
          DEPLOY_WEBHOOK_URL: https://gym.maksymzhukov.com/api/deploy/notify
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          # The webhook fans out a message to Telegram, so it's gated by a shared
          # secret. Skip cleanly if the secret isn't configured yet.
          if [ -z "${DEPLOY_WEBHOOK_SECRET:-}" ]; then
            echo "DEPLOY_WEBHOOK_SECRET not set; skipping deploy notification."
            exit 0
          fi

          # Wait 5s so the freshly (re)built containers are ready to serve.
          sleep 5

          payload=$(printf '{"version":"%s","ref":"%s","actor":"%s"}' \
            "$GITHUB_SHA" "$GITHUB_REF_NAME" "$GITHUB_ACTOR")

          # --retry rides out the brief window while the backend finishes starting.
          curl -fsS --retry 5 --retry-delay 3 --retry-connrefused \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_WEBHOOK_SECRET" \
            -d "$payload"
