name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual re-deploys from the Actions tab

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 165.227.137.141
      DEPLOY_USER: deploy
      DEPLOY_PATH: /opt/gymhelper
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          # Write the deploy key from the repo secret.
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pull the just-pushed commit on the server and (re)build the stack.
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git reset --hard origin/main
          docker compose up -d --build --remove-orphans
          docker image prune -f
          REMOTE
